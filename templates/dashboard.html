<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Consultorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f4f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0d6efd;">
    <div class="container-fluid">
        <span class="navbar-brand">Consultorio Ortodoncia</span>
        <a href="/logout" class="btn btn-light btn-sm">Salir</a>
    </div>
</nav>

<div class="container py-4">
    <h1 class="mb-4">Panel principal</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Pacientes</h5>
                    <p class="card-text">Gestioná los datos de tus pacientes.</p>
                    <a href="/pacientes" class="btn btn-primary">Ir a pacientes</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Gastos</h5>
                    <p class="card-text">Registrá compras, insumos y otros gastos.</p>
                    <a href="/gastos" class="btn btn-primary">Ir a gastos</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">Cobros</h5>
                    <p class="card-text">Registrá pagos de pacientes.</p>
                    <a href="/cobros" class="btn btn-primary">Ir a cobros</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
