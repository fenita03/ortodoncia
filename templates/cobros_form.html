<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if cobro %}Editar{% else %}Nuevo{% endif %} Cobro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f4f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0d6efd;">
    <div class="container-fluid">
        <a href="/dashboard" class="navbar-brand">Consultorio Ortodoncia</a>
        <div>
            <a href="/cobros" class="btn btn-light btn-sm me-2">Volver</a>
            <a href="/logout" class="btn btn-light btn-sm">Salir</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="mb-4">{% if cobro %}Editar{% else %}Nuevo{% endif %} cobro</h2>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Paciente</label>
                    <select name="paciente_id" class="form-select" required>
                        <option value="">Seleccionar paciente</option>
                        {% for p in pacientes %}
                        <option value="{{ p['id'] }}"
                            {% if cobro and cobro['paciente_id'] == p['id'] %}selected{% endif %}>
                            {{ p['nombre'] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" name="fecha" class="form-control"
                           value="{{ cobro['fecha'] if cobro else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text" name="descripcion" class="form-control"
                           value="{{ cobro['descripcion'] if cobro else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Método de pago</label>
                    <input type="text" name="metodo_pago" class="form-control"
                           value="{{ cobro['metodo_pago'] if cobro else '' }}"
                           placeholder="Efectivo, transferencia, tarjeta...">
                </div>

                <div class="mb-3">
                    <label class="form-label">Monto</label>
                    <input type="number" step="0.01" name="monto" class="form-control"
                           value="{{ cobro['monto'] if cobro else '' }}" required>
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/cobros" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
