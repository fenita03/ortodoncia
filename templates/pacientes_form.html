<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if paciente %}Editar{% else %}Nuevo{% endif %} Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f4f7fb;">

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#0d6efd;">
    <div class="container-fluid">
        <a href="/dashboard" class="navbar-brand">Consultorio Ortodoncia</a>
        <div>
            <a href="/pacientes" class="btn btn-light btn-sm me-2">Volver</a>
            <a href="/logout" class="btn btn-light btn-sm">Salir</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 700px;">
        <div class="card-body">
            <h2 class="mb-4">{% if paciente %}Editar{% else %}Nuevo{% endif %} paciente</h2>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control"
                           value="{{ paciente['nombre'] if paciente else '' }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control"
                           value="{{ paciente['telefono'] if paciente else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">DNI</label>
                    <input type="text" name="dni" class="form-control"
                           value="{{ paciente['dni'] if paciente else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control"
                           value="{{ paciente['direccion'] if paciente else '' }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea name="observaciones" class="form-control" rows="4">{{ paciente['observaciones'] if paciente else '' }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/pacientes" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>

</body>
</html>
